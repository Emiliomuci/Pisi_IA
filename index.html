<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pisi - Tu Asistente Personal</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pisi">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            text-align: center;
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header .status {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 5px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 90%;
            padding: 14px 18px;
            border-radius: 16px;
            animation: fadeIn 0.3s ease;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: #4a6cf7;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.pisi {
            background: rgba(255,255,255,0.1);
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.pisi .name {
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 8px;
            color: #4a6cf7;
        }

        .message.typing {
            display: flex;
            gap: 5px;
            padding: 18px 22px;
        }

        .message.typing span {
            width: 8px;
            height: 8px;
            background: #4a6cf7;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .message.typing span:nth-child(1) { animation-delay: -0.32s; }
        .message.typing span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .input-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 15px;
            display: flex;
            gap: 10px;
            position: sticky;
            bottom: 0;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .input-container input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .input-container input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .input-container button {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: #4a6cf7;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .input-container button:active {
            transform: scale(0.95);
        }

        .input-container button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .welcome {
            text-align: center;
            color: white;
            padding: 40px 20px;
        }

        .welcome .icon {
            font-size: 40px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #4a6cf7, #7c3aed);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-weight: bold;
        }

        .welcome h2 {
            margin-bottom: 10px;
        }

        .welcome p {
            opacity: 0.7;
            font-size: 14px;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .suggestion {
            background: rgba(74, 108, 247, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid rgba(74, 108, 247, 0.5);
        }

        .suggestion:hover {
            background: rgba(74, 108, 247, 0.5);
        }

        .clear-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: white;
            opacity: 0.7;
            cursor: pointer;
            font-size: 14px;
        }

        .header {
            position: relative;
        }

        @media (display-mode: standalone) {
            .header {
                padding-top: 50px;
            }
        }

        .message-content strong {
            color: #6d8cff;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Pisi</h1>
        <div class="status">Asistente de IA Personal</div>
        <button class="clear-btn" onclick="clearChat()">Limpiar</button>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="welcome" id="welcome">
            <div class="icon">P</div>
            <h2>Hola, soy Pisi</h2>
            <p>Tu asistente personal. Puedo responder cualquier pregunta.</p>
            <div class="suggestions">
                <div class="suggestion" onclick="askSuggestion('Proteína en pechuga de pollo')">Nutricion</div>
                <div class="suggestion" onclick="askSuggestion('Teoria de la relatividad')">Ciencia</div>
                <div class="suggestion" onclick="askSuggestion('Segunda Guerra Mundial')">Historia</div>
            </div>
        </div>
    </div>

    <div class="input-container">
        <input type="text" id="userInput" placeholder="Escribe tu pregunta..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">&#10148;</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcome = document.getElementById('welcome');

        let conversationHistory = [];

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function askSuggestion(text) {
            userInput.value = text;
            sendMessage();
        }

        function addMessage(content, isUser) {
            if (welcome) welcome.style.display = 'none';
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'pisi'}`;
            
            if (!isUser) {
                messageDiv.innerHTML = `<div class="name">Pisi</div><div class="message-content">${formatResponse(content)}</div>`;
            } else {
                messageDiv.textContent = content;
            }
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function formatResponse(text) {
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message pisi typing';
            typingDiv.id = 'typing';
            typingDiv.innerHTML = '<span></span><span></span><span></span>';
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            userInput.value = '';
            sendBtn.disabled = true;
            
            addMessage(message, true);
            showTyping();

            conversationHistory.push({ role: 'user', content: message });

            try {
                const response = await getPisiResponse(message);
                hideTyping();
                addMessage(response, false);
                conversationHistory.push({ role: 'assistant', content: response });
            } catch (error) {
                hideTyping();
                addMessage('Ocurrio un error. Intenta de nuevo.', false);
            }

            sendBtn.disabled = false;
            userInput.focus();
        }

        async function getPisiResponse(userMessage) {
            // Primero buscar en base de conocimientos local
            const localAnswer = getKnowledgeBaseAnswer(userMessage);
            if (localAnswer) {
                return localAnswer;
            }

            // Si no hay respuesta local, intentar API
            try {
                const systemPrompt = `Eres Pisi, un asistente experto. Reglas:
1. Responde SIEMPRE en espanol
2. NO uses emojis nunca
3. Da respuestas completas y profesionales
4. Incluye datos y cifras especificas
5. Organiza la informacion claramente`;
                
                const response = await fetch('https://api-inference.huggingface.co/models/mistralai/Mixtral-8x7B-Instruct-v0.1', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        inputs: `<s>[INST] ${systemPrompt}\n\nPregunta: ${userMessage} [/INST]`,
                        parameters: {
                            max_new_tokens: 800,
                            temperature: 0.3,
                            return_full_text: false
                        }
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data[0] && data[0].generated_text) {
                        let text = data[0].generated_text.trim();
                        text = text.replace(/^\[\/INST\]\s*/g, '');
                        // Remover emojis
                        text = text.replace(/[\u{1F600}-\u{1F64F}]|[\u{1F300}-\u{1F5FF}]|[\u{1F680}-\u{1F6FF}]|[\u{1F1E0}-\u{1F1FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]/gu, '');
                        if (text.length > 30) {
                            return text;
                        }
                    }
                }
            } catch (e) {
                console.log('API error:', e);
            }

            return getExtendedAnswer(userMessage);
        }

        function getKnowledgeBaseAnswer(message) {
            const msg = message.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            
            // ==================== NUTRICION - CARNES Y PROTEINAS ====================
            
            if (msg.match(/prote[ií]?na.*(pollo|pechuga)|pechuga.*prote[ií]?na|pollo.*prote[ií]?na|pechuga/)) {
                return `**Informacion nutricional de la pechuga de pollo:**

Por cada 100 gramos de pechuga cocida sin piel:

**Macronutrientes:**
- Proteina: 31 gramos
- Calorias: 165 kcal
- Grasa total: 3.6 gramos
- Grasa saturada: 1 gramo
- Carbohidratos: 0 gramos
- Colesterol: 85 mg

**Por porcion tipica de 150g:**
- Proteina: 46.5 gramos
- Calorias: 248 kcal

**Vitaminas y minerales:**
- Niacina (B3): 13.7 mg (86% VD)
- Vitamina B6: 0.6 mg (35% VD)
- Vitamina B12: 0.3 mcg (13% VD)
- Fosforo: 228 mg (33% VD)
- Selenio: 27 mcg (49% VD)
- Potasio: 256 mg

**Valor biologico:** 79 (alto)

La pechuga de pollo es una de las fuentes de proteina mas magras y eficientes. Contiene todos los aminoacidos esenciales, siendo ideal para desarrollo muscular y dietas de control de peso.`;
            }

            if (msg.match(/carne.*(res|vaca)|res.*carne|bistec|filete|carne roja/)) {
                return `**Informacion nutricional de la carne de res:**

            if (msg.match(/huevo|huevos/)) {

            }

            if (msg.match(/atun|tuna/)) {
                return `**Informacion nutricional del atun:**

El atun es una de las fuentes de proteina mas magras disponibles. Se recomienda limitar consumo a 2-3 porciones semanales debido al contenido de mercurio.`;
            }

            // ==================== NUTRICION - FRUTAS ====================

            if (msg.match(/manzana/)) {
                return `**Informacion nutricional de la manzana:**

Por cada 100 gramos de manzana cruda con piel:

**Macronutrientes:**

Comer la manzana con cascara proporciona mas fibra y antioxidantes.`;
            }

            if (msg.match(/platano|banana|banano/)) {
                return `**Informacion nutricional del platano:**

            if (msg.match(/leche/)) {

            }

            if (msg.match(/avena/)) {

Por cada 100 gramos de avena cruda:

            // ==================== CIENCIA ====================

            if (msg.match(/relatividad|einstein/)) {
                return `**Teoria de la Relatividad de Einstein:**

**Relatividad Especial (1905):**

Postulados fundamentales:
1. Las leyes de la fisica son iguales para todos los observadores en movimiento uniforme
2. La velocidad de la luz es constante (299,792,458 m/s) para todos los observadores

**Consecuencias:**
- Dilatacion del tiempo: El tiempo pasa mas lento para objetos en movimiento
- Contraccion de la longitud: Los objetos se acortan en direccion del movimiento
- Equivalencia masa-energia: E = mc2

**Relatividad General (1915):**

Principio central: La gravedad no es una fuerza, sino una curvatura del espacio-tiempo causada por masa y energia.

**Predicciones confirmadas:**
- Deflexion de la luz por gravedad (1919)
- Ondas gravitacionales (detectadas 2015)
- Agujeros negros
- Dilatacion gravitacional del tiempo

**Aplicacion practica:**
Los satelites GPS deben corregir sus relojes 38 microsegundos diarios porque el tiempo pasa mas rapido en orbita (menos gravedad) y mas lento por su velocidad.`;
            }

            if (msg.match(/fotosintesis/)) {
                return `**Fotosintesis:**

Proceso mediante el cual plantas, algas y ciertas bacterias convierten energia luminosa en energia quimica.

**Ecuacion general:**
6CO2 + 6H2O + luz = C6H12O6 + 6O2

Dioxido de carbono + Agua + Luz = Glucosa + Oxigeno

**Fases del proceso:**

**1. Fase luminosa (tilacoides):**
- Captacion de luz por clorofila
- Fotolisis del agua (ruptura de H2O)
- Produccion de ATP y NADPH
- Liberacion de O2 como subproducto

**2. Ciclo de Calvin (estroma):**
- Fijacion de CO2 por enzima RuBisCO
- Reduccion usando ATP y NADPH

La derivada mide la tasa de cambio instantanea de una funcion.

**Notacion:**
f'(x), dy/dx, df/dx, Df(x)

**Definicion formal:**
f'(x) = lim[h->0] (f(x+h) - f(x)) / h

**Reglas basicas:**

1. Constante: d/dx[c] = 0
2. Potencia: d/dx[xn] = n*x(n-1)
3. Suma: d/dx[f+g] = f' + g'
4. Producto: d/dx[fg] = f'g + fg'
5. Cociente: d/dx[f/g] = (f'g - fg') / g2
6. Cadena: d/dx[f(g(x))] = f'(g(x)) * g'(x)

**Derivadas comunes:**
- d/dx[sin(x)] = cos(x)
- d/dx[cos(x)] = -sin(x)
- d/dx[ex] = ex
- d/dx[ln(x)] = 1/x
- d/dx[tan(x)] = sec2(x)

**Aplicaciones:**
- Velocidad y aceleracion

- Analisis de graficas
