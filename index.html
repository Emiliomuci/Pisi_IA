<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pisi - Inteligencia Artificial</title>
    <meta name="theme-color" content="#0f0f1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pisi">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #e0e0e0;
        }

        .header {
            background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(139,92,246,0.1));
            padding: 14px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
        }

        .header h1 { 
            font-size: 20px; 
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header .status { 
            font-size: 10px; 
            opacity: 0.6; 
            margin-top: 3px;
            color: #a5b4fc;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 90%;
            padding: 14px 18px;
            border-radius: 18px;
            animation: fadeIn 0.4s ease;
            line-height: 1.7;
            font-size: 14px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(99,102,241,0.3);
        }

        .message.pisi {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.pisi .name {
            font-weight: 700;
            font-size: 11px;
            margin-bottom: 10px;
            color: #a5b4fc;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .message.typing {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 16px 20px;
            flex-wrap: wrap;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #818cf8;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        .typing-status {
            font-size: 11px;
            color: #818cf8;
            width: 100%;
            margin-top: 8px;
        }

        .input-container {
            background: rgba(15,15,26,0.95);
            padding: 12px 16px 20px;
            display: flex;
            gap: 10px;
            position: sticky;
            bottom: 0;
            border-top: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
        }

        .input-container input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            background: rgba(255,255,255,0.05);
            color: white;
            transition: all 0.3s;
        }

        .input-container input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 20px rgba(99,102,241,0.2);
        }

        .input-container input::placeholder { color: rgba(255,255,255,0.3); }

        .input-container button {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(99,102,241,0.3);
        }

        .input-container button:hover {
            transform: scale(1.05);
        }

        .input-container button:disabled { 
            opacity: 0.5; 
            transform: none;
        }

        .welcome {
            text-align: center;
            padding: 40px 20px;
        }

        .welcome .icon {
            font-size: 32px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            width: 80px;
            height: 80px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-weight: bold;
            box-shadow: 0 8px 30px rgba(99,102,241,0.4);
        }

        .welcome h2 {
            font-size: 22px;
            margin-bottom: 8px;
        }

        .welcome p { 
            opacity: 0.5; 
            font-size: 13px; 
            max-width: 280px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 24px;
        }

        .suggestion {
            background: rgba(99,102,241,0.15);
            color: #a5b4fc;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid rgba(99,102,241,0.2);
            transition: all 0.3s;
        }

        .suggestion:hover {
            background: rgba(99,102,241,0.25);
            transform: translateY(-2px);
        }

        .clear-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #818cf8;
            opacity: 0.6;
            cursor: pointer;
            font-size: 12px;
        }

        .header { position: relative; }

        @media (display-mode: standalone) {
            .header { padding-top: 50px; }
        }

        .message-content { 
            white-space: pre-wrap;
        }
        
        .message-content strong { 
            color: #c4b5fd;
            font-weight: 600;
        }

        .message-content ul, .message-content ol {
            margin: 10px 0;
            padding-left: 20px;
        }

        .message-content li {
            margin: 6px 0;
        }
        
        .sources {
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 11px;
        }
        
        .sources-title {
            color: #818cf8;
            font-weight: 600;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .sources a {
            color: #a5b4fc;
            text-decoration: none;
            display: block;
            padding: 4px 0;
            opacity: 0.8;
        }
        
        .sources a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .ai-badge {
            display: inline-block;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Pisi <span class="ai-badge">IA</span></h1>
        <div class="status">Inteligencia Artificial Personal</div>
        <button class="clear-btn" onclick="clearChat()">Limpiar</button>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="welcome" id="welcome">
            <div class="icon">P</div>
            <h2>Hola, soy Pisi</h2>
            <p>Tu asistente de inteligencia artificial. Proceso informacion de multiples fuentes para darte respuestas completas y precisas.</p>
            <div class="suggestions">
                <div class="suggestion" onclick="askSuggestion('Cuanta proteina tiene el pollo y cuales son sus beneficios?')">Nutricion</div>
                <div class="suggestion" onclick="askSuggestion('Explicame la teoria de la relatividad de Einstein')">Ciencia</div>
                <div class="suggestion" onclick="askSuggestion('Que fue la Segunda Guerra Mundial y cuales fueron sus causas?')">Historia</div>
                <div class="suggestion" onclick="askSuggestion('Como funciona la inteligencia artificial?')">Tecnologia</div>
            </div>
        </div>
    </div>

    <div class="input-container">
        <input type="text" id="userInput" placeholder="Preguntame lo que quieras..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">&#10148;</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcome = document.getElementById('welcome');

        let conversationHistory = [];

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function askSuggestion(text) {
            userInput.value = text;
            sendMessage();
        }

        function addMessage(content, isUser, sources = null) {
            if (welcome) welcome.style.display = 'none';
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'pisi'}`;
            
            if (!isUser) {
                let sourceHTML = '';
                if (sources && sources.length > 0) {
                    sourceHTML = '<div class="sources"><div class="sources-title">Fuentes consultadas:</div>';
                    sources.forEach(s => {
                        sourceHTML += `<a href="${s.url}" target="_blank">${s.name}</a>`;
                    });
                    sourceHTML += '</div>';
                }
                messageDiv.innerHTML = `<div class="name">Pisi</div><div class="message-content">${formatResponse(content)}</div>${sourceHTML}`;
            } else {
                messageDiv.textContent = content;
            }
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function formatResponse(text) {
            // Convertir **texto** a negrita
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            // Convertir listas con -
            text = text.replace(/^- (.+)$/gm, '<li>$1</li>');
            text = text.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
            // Saltos de linea
            text = text.replace(/\n/g, '<br>');
            // Limpiar ul/br duplicados
            text = text.replace(/<br><ul>/g, '<ul>');
            text = text.replace(/<\/ul><br>/g, '</ul>');
            return text;
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message pisi typing';
            typingDiv.id = 'typing';
            typingDiv.innerHTML = `
                <div class="typing-dots"><span></span><span></span><span></span></div>
                <div class="typing-status">Pensando...</div>
            `;
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function updateTypingStatus(text) {
            const status = document.querySelector('#typing .typing-status');
            if (status) status.textContent = text;
        }

        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            userInput.value = '';
            sendBtn.disabled = true;
            
            addMessage(message, true);
            showTyping();

            conversationHistory.push({ role: 'user', content: message });

            try {
                const response = await generateAIResponse(message);
                hideTyping();
                addMessage(response.text, false, response.sources);
                conversationHistory.push({ role: 'assistant', content: response.text });
            } catch (error) {
                console.error('Error:', error);
                hideTyping();
                addMessage('Ocurrio un error al procesar tu pregunta. Por favor intenta de nuevo.', false);
            }

            sendBtn.disabled = false;
            userInput.focus();
        }

        async function generateAIResponse(query) {
            const sources = [];
            let contextData = '';

            // Paso 1: Recopilar informacion de multiples fuentes
            updateTypingStatus('Buscando informacion...');

            // Buscar en Wikipedia (espanol e ingles)
            const wikiData = await fetchWikipedia(query);
            if (wikiData.content) {
                contextData += `\n\nINFORMACION DE WIKIPEDIA:\n${wikiData.content}`;
                sources.push(...wikiData.sources);
            }

            // Buscar en DuckDuckGo para datos adicionales
            const ddgData = await fetchDuckDuckGo(query);
            if (ddgData.content) {
                contextData += `\n\nINFORMACION ADICIONAL:\n${ddgData.content}`;
                if (ddgData.sources.length > 0) sources.push(...ddgData.sources);
            }

            // Si es sobre nutricion, buscar en USDA
            if (query.toLowerCase().match(/proteina|calorias|nutricion|nutrientes|vitamina|grasa|carbohidrato|mineral|alimento|comida|comer|dieta/)) {
                const nutritionData = await fetchNutrition(query);
                if (nutritionData.content) {
                    contextData += `\n\nDATOS NUTRICIONALES OFICIALES (USDA):\n${nutritionData.content}`;
                    sources.push(...nutritionData.sources);
                }
            }

            // Paso 2: Procesar con IA
            updateTypingStatus('Procesando con IA...');

            // Intentar con multiples modelos de IA
            let aiResponse = await tryAIModels(query, contextData, conversationHistory);

            if (!aiResponse) {
                // Fallback: generar respuesta estructurada localmente
                aiResponse = generateLocalResponse(query, contextData);
            }

            return {
                text: aiResponse,
                sources: sources.slice(0, 4) // Maximo 4 fuentes
            };
        }

        async function tryAIModels(query, context, history) {
            const systemPrompt = `Eres Pisi, un asistente de inteligencia artificial experto y profesional. 

REGLAS ESTRICTAS:
1. Responde SIEMPRE en espanol
2. NO uses emojis
3. Sintetiza y combina la informacion proporcionada
4. Da respuestas completas, organizadas y faciles de entender
5. Usa formato con **negritas** para destacar puntos importantes
6. Incluye datos especificos y numeros cuando esten disponibles
7. Si la informacion de contexto es insuficiente, usa tu conocimiento general
8. Estructura tu respuesta con secciones claras`;

            const historyText = history.slice(-4).map(h => 
                `${h.role === 'user' ? 'Usuario' : 'Pisi'}: ${h.content}`
            ).join('\n');

            const fullPrompt = `${systemPrompt}

CONTEXTO DE LA CONVERSACION:
${historyText}

INFORMACION RECOPILADA DE FUENTES:
${context || 'No se encontro informacion adicional.'}

PREGUNTA DEL USUARIO: ${query}

Genera una respuesta completa, profesional y bien estructurada:`;

            // Modelo 1: Mixtral (Hugging Face)
            try {
                updateTypingStatus('Generando respuesta con IA...');
                const response = await fetch('https://api-inference.huggingface.co/models/mistralai/Mixtral-8x7B-Instruct-v0.1', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        inputs: `<s>[INST] ${fullPrompt} [/INST]`,
                        parameters: {
                            max_new_tokens: 1000,
                            temperature: 0.7,
                            top_p: 0.9,
                            return_full_text: false
                        }
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data[0]?.generated_text) {
                        let text = data[0].generated_text.trim();
                        text = cleanAIResponse(text);
                        if (text.length > 100) return text;
                    }
                }
            } catch (e) {
                console.log('Mixtral error:', e);
            }

            // Modelo 2: Zephyr (backup)
            try {
                updateTypingStatus('Intentando modelo alternativo...');
                const response = await fetch('https://api-inference.huggingface.co/models/HuggingFaceH4/zephyr-7b-beta', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        inputs: `<|system|>${systemPrompt}</s><|user|>${query}\n\nContexto: ${context?.substring(0, 2000) || 'Sin contexto adicional'}</s><|assistant|>`,
                        parameters: {
                            max_new_tokens: 800,
                            temperature: 0.7,
                            return_full_text: false
                        }
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data[0]?.generated_text) {
                        let text = data[0].generated_text.trim();
                        text = cleanAIResponse(text);
                        if (text.length > 100) return text;
                    }
                }
            } catch (e) {
                console.log('Zephyr error:', e);
            }

            // Modelo 3: Qwen (otro backup)
            try {
                const response = await fetch('https://api-inference.huggingface.co/models/Qwen/Qwen1.5-7B-Chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        inputs: `<|im_start|>system\n${systemPrompt}<|im_end|>\n<|im_start|>user\n${query}\nContexto: ${context?.substring(0, 1500)}<|im_end|>\n<|im_start|>assistant\n`,
                        parameters: {
                            max_new_tokens: 800,
                            temperature: 0.7,
                            return_full_text: false
                        }
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data[0]?.generated_text) {
                        let text = data[0].generated_text.trim();
                        text = cleanAIResponse(text);
                        if (text.length > 100) return text;
                    }
                }
            } catch (e) {
                console.log('Qwen error:', e);
            }

            return null;
        }

        function cleanAIResponse(text) {
            // Limpiar tokens especiales
            text = text.replace(/^\[\/INST\]\s*/g, '');
            text = text.replace(/<\|.*?\|>/g, '');
            text = text.replace(/^(assistant|Pisi):\s*/gi, '');
            // Remover emojis
            text = text.replace(/[\u{1F600}-\u{1F64F}]|[\u{1F300}-\u{1F5FF}]|[\u{1F680}-\u{1F6FF}]|[\u{1F1E0}-\u{1F1FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]/gu, '');
            return text.trim();
        }

        function generateLocalResponse(query, context) {
            // Respuesta inteligente local basada en el contexto
            if (!context || context.length < 50) {
                return `No pude encontrar suficiente informacion sobre "${query}" en las fuentes disponibles. Te sugiero:

- Reformular tu pregunta con mas detalle
- Usar terminos mas especificos
- Dividir preguntas complejas en partes

Estoy aqui para ayudarte, intenta de nuevo con otra formulacion.`;
            }

            // Extraer y estructurar la informacion del contexto
            let response = '';
            
            // Procesar contexto de Wikipedia
            const wikiMatch = context.match(/INFORMACION DE WIKIPEDIA:\n([\s\S]*?)(?=\n\n[A-Z]|$)/);
            if (wikiMatch) {
                const wikiContent = wikiMatch[1].trim();
                // Tomar los primeros parrafos relevantes
                const paragraphs = wikiContent.split('\n\n').filter(p => p.length > 50).slice(0, 3);
                if (paragraphs.length > 0) {
                    response += paragraphs.join('\n\n');
                }
            }

            // Agregar datos nutricionales si existen
            const nutritionMatch = context.match(/DATOS NUTRICIONALES OFICIALES[\s\S]*?:\n([\s\S]*?)(?=\n\n[A-Z]|$)/);
            if (nutritionMatch) {
                response += '\n\n**Informacion Nutricional:**\n' + nutritionMatch[1].trim();
            }

            // Si hay info adicional de DuckDuckGo
            const ddgMatch = context.match(/INFORMACION ADICIONAL:\n([\s\S]*?)(?=\n\n[A-Z]|$)/);
            if (ddgMatch && response.length < 500) {
                response += '\n\n**Datos Adicionales:**\n' + ddgMatch[1].trim().substring(0, 500);
            }

            // Limitar longitud
            if (response.length > 2500) {
                response = response.substring(0, 2500) + '...';
            }

            return response || 'No encontre informacion suficiente. Por favor intenta con otra pregunta.';
        }

        async function fetchWikipedia(query) {
            const result = { content: '', sources: [] };
            
            try {
                // Buscar en espanol
                const searchUrl = `https://es.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=3`;
                const searchResponse = await fetch(searchUrl);
                const searchData = await searchResponse.json();

                if (searchData.query?.search?.length > 0) {
                    // Obtener contenido de los primeros resultados
                    for (const item of searchData.query.search.slice(0, 2)) {
                        const contentUrl = `https://es.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(item.title)}&prop=extracts&exintro=false&explaintext=true&format=json&origin=*&exsectionformat=plain`;
                        const contentResponse = await fetch(contentUrl);
                        const contentData = await contentResponse.json();
                        
                        const pages = contentData.query?.pages;
                        if (pages) {
                            const pageId = Object.keys(pages)[0];
                            if (pageId !== '-1' && pages[pageId].extract) {
                                let extract = pages[pageId].extract.substring(0, 2000);
                                result.content += extract + '\n\n';
                                result.sources.push({
                                    name: `Wikipedia: ${item.title}`,
                                    url: `https://es.wikipedia.org/wiki/${encodeURIComponent(item.title.replace(/ /g, '_'))}`
                                });
                            }
                        }
                    }
                }

                // Si no hay resultados en espanol, buscar en ingles
                if (!result.content) {
                    const searchUrlEn = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=2`;
                    const searchResponseEn = await fetch(searchUrlEn);
                    const searchDataEn = await searchResponseEn.json();

                    if (searchDataEn.query?.search?.length > 0) {
                        const item = searchDataEn.query.search[0];
                        const contentUrl = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(item.title)}&prop=extracts&exintro=true&explaintext=true&format=json&origin=*`;
                        const contentResponse = await fetch(contentUrl);
                        const contentData = await contentResponse.json();
                        
                        const pages = contentData.query?.pages;
                        if (pages) {
                            const pageId = Object.keys(pages)[0];
                            if (pageId !== '-1' && pages[pageId].extract) {
                                result.content = pages[pageId].extract.substring(0, 1500);
                                result.sources.push({
                                    name: `Wikipedia (EN): ${item.title}`,
                                    url: `https://en.wikipedia.org/wiki/${encodeURIComponent(item.title.replace(/ /g, '_'))}`
                                });
                            }
                        }
                    }
                }
            } catch (e) {
                console.log('Wikipedia error:', e);
            }

            return result;
        }

        async function fetchDuckDuckGo(query) {
            const result = { content: '', sources: [] };
            
            try {
                const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.Abstract && data.Abstract.length > 30) {
                    result.content = data.Abstract;
                    if (data.AbstractURL) {
                        result.sources.push({
                            name: data.AbstractSource || 'DuckDuckGo',
                            url: data.AbstractURL
                        });
                    }
                }

                // Agregar temas relacionados
                if (data.RelatedTopics?.length > 0) {
                    result.content += '\n\nTemas relacionados:\n';
                    data.RelatedTopics.slice(0, 3).forEach(topic => {
                        if (topic.Text) {
                            result.content += `- ${topic.Text.substring(0, 200)}\n`;
                        }
                    });
                }

                // Agregar infobox si existe
                if (data.Infobox?.content?.length > 0) {
                    result.content += '\n\nDatos:\n';
                    data.Infobox.content.slice(0, 8).forEach(item => {
                        if (item.label && item.value) {
                            result.content += `- ${item.label}: ${item.value}\n`;
                        }
                    });
                }
            } catch (e) {
                console.log('DuckDuckGo error:', e);
            }

            return result;
        }

        async function fetchNutrition(query) {
            const result = { content: '', sources: [] };
            
            try {
                // Extraer terminos de alimentos
                const foodTerms = query.toLowerCase()
                    .replace(/proteina|calorias|nutricion|nutrientes|vitaminas|cuanta|cuanto|tiene|del|de|en|el|la|los|las|que|como|cual|cuales/g, '')
                    .trim();

                if (!foodTerms || foodTerms.length < 2) return result;

                const url = `https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(foodTerms)}&pageSize=1&api_key=DEMO_KEY`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.foods?.length > 0) {
                    const food = data.foods[0];
                    result.content = `Alimento: ${food.description}\n\nPor cada 100g:\n`;

                    const nutrients = food.foodNutrients || [];
                    const importantNutrients = {
                        'Energy': 'Energia',
                        'Protein': 'Proteina',
                        'Total lipid': 'Grasa total',
                        'Carbohydrate': 'Carbohidratos',
                        'Fiber': 'Fibra',
                        'Sugars': 'Azucares',
                        'Calcium': 'Calcio',
                        'Iron': 'Hierro',
                        'Sodium': 'Sodio',
                        'Vitamin C': 'Vitamina C',
                        'Vitamin A': 'Vitamina A',
                        'Vitamin D': 'Vitamina D',
                        'Vitamin B-12': 'Vitamina B12',
                        'Cholesterol': 'Colesterol',
                        'Potassium': 'Potasio',
                        'Magnesium': 'Magnesio',
                        'Zinc': 'Zinc',
                        'Folate': 'Acido Folico'
                    };

                    nutrients.forEach(nutrient => {
                        for (const [eng, esp] of Object.entries(importantNutrients)) {
                            if (nutrient.nutrientName?.includes(eng)) {
                                result.content += `- ${esp}: ${nutrient.value} ${nutrient.unitName}\n`;
                                break;
                            }
                        }
                    });

                    result.sources.push({
                        name: 'USDA FoodData Central (Departamento de Agricultura de EE.UU.)',
                        url: 'https://fdc.nal.usda.gov/'
                    });
                }
            } catch (e) {
                console.log('Nutrition API error:', e);
            }

            return result;
        }
