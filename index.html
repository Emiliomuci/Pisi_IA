<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pisi - Inteligencia Artificial</title>
    <meta name="theme-color" content="#0f0f1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pisi">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #e0e0e0;
        }

        .header {
            background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(139,92,246,0.1));
            padding: 14px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
        }

        .header h1 { 
            font-size: 20px; 
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header .status { 
            font-size: 10px; 
            opacity: 0.6; 
            margin-top: 3px;
            color: #a5b4fc;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 90%;
            padding: 14px 18px;
            border-radius: 18px;
            animation: fadeIn 0.4s ease;
            line-height: 1.7;
            font-size: 14px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(99,102,241,0.3);
        }

        .message.pisi {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.pisi .name {
            font-weight: 700;
            font-size: 11px;
            margin-bottom: 10px;
            color: #a5b4fc;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .message.typing {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 16px 20px;
            flex-wrap: wrap;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #818cf8;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        .typing-status {
            font-size: 11px;
            color: #818cf8;
            width: 100%;
            margin-top: 8px;
        }

        .input-container {
            background: rgba(15,15,26,0.95);
            padding: 12px 16px 20px;
            display: flex;
            gap: 10px;
            position: sticky;
            bottom: 0;
            border-top: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
        }

        .input-container input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            background: rgba(255,255,255,0.05);
            color: white;
            transition: all 0.3s;
        }

        .input-container input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 20px rgba(99,102,241,0.2);
        }

        .input-container input::placeholder { color: rgba(255,255,255,0.3); }

        .input-container button {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(99,102,241,0.3);
        }

        .input-container button:hover { transform: scale(1.05); }
        .input-container button:disabled { opacity: 0.5; transform: none; }

        .welcome {
            text-align: center;
            padding: 40px 20px;
        }

        .welcome .icon {
            font-size: 32px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            width: 80px;
            height: 80px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-weight: bold;
            box-shadow: 0 8px 30px rgba(99,102,241,0.4);
        }

        .welcome h2 { font-size: 22px; margin-bottom: 8px; }
        .welcome p { opacity: 0.5; font-size: 13px; max-width: 280px; margin: 0 auto; line-height: 1.6; }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 24px;
        }

        .suggestion {
            background: rgba(99,102,241,0.15);
            color: #a5b4fc;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid rgba(99,102,241,0.2);
            transition: all 0.3s;
        }

        .suggestion:hover { background: rgba(99,102,241,0.25); transform: translateY(-2px); }

        .clear-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #818cf8;
            opacity: 0.6;
            cursor: pointer;
            font-size: 12px;
        }

        .header { position: relative; }

        @media (display-mode: standalone) { .header { padding-top: 50px; } }

        .message-content { white-space: pre-wrap; }
        .message-content strong { color: #c4b5fd; font-weight: 600; }
        .message-content ul, .message-content ol { margin: 10px 0; padding-left: 20px; }
        .message-content li { margin: 6px 0; }
        
        .sources {
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 11px;
        }
        
        .sources-title { color: #818cf8; font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .sources a { color: #a5b4fc; text-decoration: none; display: block; padding: 4px 0; opacity: 0.8; }
        .sources a:hover { opacity: 1; text-decoration: underline; }

        .ai-badge {
            display: inline-block;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Pisi <span class="ai-badge">IA</span></h1>
        <div class="status">Inteligencia Artificial Personal</div>
        <button class="clear-btn" onclick="clearChat()">Limpiar</button>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="welcome" id="welcome">
            <div class="icon">P</div>
            <h2>Hola, soy Pisi</h2>
            <p>Tu asistente de inteligencia artificial personal. Puedo conversar contigo, responder preguntas y recordar nuestra conversacion.</p>
            <div class="suggestions">
                <div class="suggestion" onclick="askSuggestion('Hola Pisi, como estas?')">Saludar</div>
                <div class="suggestion" onclick="askSuggestion('Cuanta proteina tiene el pollo?')">Nutricion</div>
                <div class="suggestion" onclick="askSuggestion('Que es la inteligencia artificial?')">Tecnologia</div>
                <div class="suggestion" onclick="askSuggestion('Cuentame sobre la Segunda Guerra Mundial')">Historia</div>
            </div>
        </div>
    </div>

    <div class="input-container">
        <input type="text" id="userInput" placeholder="Escribe un mensaje..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">&#10148;</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcome = document.getElementById('welcome');

        // Memoria de la conversacion
        let conversationHistory = [];
        let conversationContext = {
            topics: [],
            lastTopic: null,
            userName: null
        };

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function askSuggestion(text) {
            userInput.value = text;
            sendMessage();
        }

        function addMessage(content, isUser, sources = null) {
            if (welcome) welcome.style.display = 'none';
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'pisi'}`;
            
            if (!isUser) {
                let sourceHTML = '';
                if (sources && sources.length > 0) {
                    sourceHTML = '<div class="sources"><div class="sources-title">Fuentes consultadas:</div>';
                    sources.forEach(s => {
                        sourceHTML += `<a href="${s.url}" target="_blank">${s.name}</a>`;
                    });
                    sourceHTML += '</div>';
                }
                messageDiv.innerHTML = `<div class="name">Pisi</div><div class="message-content">${formatResponse(content)}</div>${sourceHTML}`;
            } else {
                messageDiv.textContent = content;
            }
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function formatResponse(text) {
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/^- (.+)$/gm, '<li>$1</li>');
            text = text.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
            text = text.replace(/\n/g, '<br>');
            text = text.replace(/<br><ul>/g, '<ul>');
            text = text.replace(/<\/ul><br>/g, '</ul>');
            return text;
        }

        function showTyping(statusText = 'Pensando...') {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message pisi typing';
            typingDiv.id = 'typing';
            typingDiv.innerHTML = `
                <div class="typing-dots"><span></span><span></span><span></span></div>
                <div class="typing-status">${statusText}</div>
            `;
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function updateTypingStatus(text) {
            const status = document.querySelector('#typing .typing-status');
            if (status) status.textContent = text;
        }

        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            userInput.value = '';
            sendBtn.disabled = true;
            
            addMessage(message, true);
            
            // Guardar en historial
            conversationHistory.push({ role: 'user', content: message });

            // Detectar tipo de mensaje
            const messageType = detectMessageType(message);
            
            if (messageType === 'conversational') {
                // Respuesta conversacional rapida sin busqueda
                showTyping('Pensando...');
                await sleep(500);
                const response = generateConversationalResponse(message);
                hideTyping();
                addMessage(response, false);
                conversationHistory.push({ role: 'assistant', content: response });
            } else {
                // Necesita busqueda de informacion
                showTyping('Analizando pregunta...');
                try {
                    const response = await generateAIResponse(message);
                    hideTyping();
                    addMessage(response.text, false, response.sources);
                    conversationHistory.push({ role: 'assistant', content: response.text });
                    
                    // Actualizar contexto
                    updateContext(message, response.text);
                } catch (error) {
                    console.error('Error:', error);
                    hideTyping();
                    addMessage('Disculpa, ocurrio un error. Por favor intenta de nuevo.', false);
                }
            }

            sendBtn.disabled = false;
            userInput.focus();
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function detectMessageType(message) {
            const msg = message.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            
            // Patrones conversacionales (no requieren busqueda)
            const conversationalPatterns = [
                /^(hola|hey|buenas|saludos|que tal|hi|hello)/,
                /^(pisi|oye pisi|hey pisi)/,
                /como (estas|te llamas|te va)/,
                /^(adios|bye|hasta luego|nos vemos|chao)/,
                /^(gracias|muchas gracias|te agradezco)/,
                /^(ok|vale|entiendo|de acuerdo|perfecto|genial)/,
                /^(si|no|claro|obvio)$/,
                /quien eres|que eres|eres una ia|eres real/,
                /que puedes hacer|para que sirves|como funcionas/,
                /me llamo|mi nombre es/,
                /^(bien|mal|mas o menos|regular)$/,
                /que hora|que dia|que fecha/,
                /cuentame (un chiste|algo gracioso)/,
                /^(ayuda|help)$/
            ];

            for (const pattern of conversationalPatterns) {
                if (pattern.test(msg)) {
                    return 'conversational';
                }
            }

            // Si el mensaje es muy corto y no parece una pregunta de informacion
            if (msg.length < 15 && !msg.includes('?') && !msg.match(/que es|como|cuando|donde|por que|cuanto|cual/)) {
                return 'conversational';
            }

            return 'informational';
        }

        function generateConversationalResponse(message) {
            const msg = message.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const history = conversationHistory.slice(-6);
            
            // Saludos
            if (msg.match(/^(hola|hey|buenas|saludos|hi|hello|pisi.*hola|hola.*pisi)/)) {
                const greetings = [
                    'Hola! Me da gusto saludarte. Soy Pisi, tu asistente de inteligencia artificial. En que puedo ayudarte hoy?',
                    'Hola! Como estas? Soy Pisi y estoy aqui para ayudarte con lo que necesites.',
                    'Buenas! Que gusto verte por aqui. Soy Pisi, tu asistente personal. Que te gustaria saber o conversar?'
                ];
                return greetings[Math.floor(Math.random() * greetings.length)];
            }

            // Como estas
            if (msg.match(/como estas|como te va|que tal estas|como andas/)) {
                return 'Muy bien, gracias por preguntar! Estoy listo para ayudarte con cualquier pregunta o simplemente conversar. Y tu, como te encuentras?';
            }

            // Quien eres / Que eres
            if (msg.match(/quien eres|que eres|eres una ia|eres real|eres un robot/)) {
                return 'Soy Pisi, tu asistente de inteligencia artificial personal. Fui creado para ayudarte a encontrar informacion, responder preguntas y mantener conversaciones. Puedo buscar datos en internet, recordar nuestra conversacion y darte respuestas utiles sobre casi cualquier tema.';
            }

            // Que puedes hacer
            if (msg.match(/que puedes hacer|para que sirves|como funcionas|que sabes/)) {
                return `Puedo ayudarte con muchas cosas:

**Conversacion:** Puedo charlar contigo y recordar lo que hemos hablado.

**Informacion:** Busco datos en Wikipedia, bases de datos oficiales y otras fuentes confiables.

**Nutricion:** Tengo acceso a la base de datos del USDA con informacion nutricional oficial.

**Conocimiento general:** Historia, ciencia, tecnologia, geografia y mas.

Solo preguntame lo que necesites y hare mi mejor esfuerzo por ayudarte.`;
            }

            // Nombre del usuario
            if (msg.match(/me llamo|mi nombre es/)) {
                const nameMatch = message.match(/(?:me llamo|mi nombre es)\s+(\w+)/i);
                if (nameMatch) {
                    conversationContext.userName = nameMatch[1];
                    return `Mucho gusto, ${nameMatch[1]}! Recordare tu nombre. En que puedo ayudarte?`;
                }
            }

            // Despedida
            if (msg.match(/adios|bye|hasta luego|nos vemos|chao|me voy/)) {
                const name = conversationContext.userName ? `, ${conversationContext.userName}` : '';
                return `Hasta luego${name}! Fue un gusto conversar contigo. Cuando quieras volver a hablar, aqui estare.`;
            }

            // Gracias
            if (msg.match(/gracias|muchas gracias|te agradezco/)) {
                return 'De nada! Me alegra poder ayudarte. Si tienes mas preguntas, no dudes en hacerlas.';
            }

            // Confirmaciones
            if (msg.match(/^(ok|vale|entiendo|de acuerdo|perfecto|genial|bien)$/)) {
                return 'Perfecto! Hay algo mas en lo que pueda ayudarte?';
            }

            // Hora y fecha
            if (msg.match(/que hora|hora actual/)) {
                const now = new Date();
                return `Son las ${now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })}. Necesitas algo mas?`;
            }

            if (msg.match(/que dia|que fecha|fecha actual/)) {
                const now = new Date();
                return `Hoy es ${now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}. En que mas puedo ayudarte?`;
            }

            // Chiste
            if (msg.match(/chiste|algo gracioso|hazme reir/)) {
                const jokes = [
                    'Por que los programadores prefieren el modo oscuro? Porque la luz atrae a los bugs.',
                    'Que le dice un bit a otro? Nos vemos en el bus.',
                    'Como se despiden los quimicos? Acido un placer conocerte.',
                    'Por que el libro de matematicas estaba triste? Porque tenia muchos problemas.'
                ];
                return jokes[Math.floor(Math.random() * jokes.length)];
            }

            // Si menciona algo del contexto anterior
            if (conversationContext.lastTopic && msg.match(/mas|continua|sigue|y que mas|otro|otra/)) {
                return `Claro, sobre ${conversationContext.lastTopic}, que mas te gustaria saber? Puedes preguntarme algo especifico.`;
            }

            // Respuesta generica para conversacion
            return 'Entiendo. Hay algo especifico sobre lo que te gustaria que busque informacion o te ayude?';
        }

        function updateContext(question, answer) {
            // Extraer posible tema de la pregunta
            const topics = question.match(/(?:sobre|acerca de|que es|quien es|como es)\s+(.+?)(?:\?|$)/i);
            if (topics) {
                conversationContext.lastTopic = topics[1].trim();
                conversationContext.topics.push(topics[1].trim());
            }
        }

        async function generateAIResponse(query) {
            const sources = [];
            let contextData = '';

            // Verificar si pregunta sobre algo de la conversacion anterior
            const contextualQuery = enrichQueryWithContext(query);

            // Paso 1: Recopilar informacion de multiples fuentes
            updateTypingStatus('Buscando informacion...');

            // Buscar en Wikipedia
            const wikiData = await fetchWikipedia(contextualQuery);
            if (wikiData.content) {
                contextData += `\n\nWIKIPEDIA:\n${wikiData.content}`;
                sources.push(...wikiData.sources);
            }

            // DuckDuckGo para datos adicionales
            const ddgData = await fetchDuckDuckGo(contextualQuery);
            if (ddgData.content) {
                contextData += `\n\nINFORMACION ADICIONAL:\n${ddgData.content}`;
                if (ddgData.sources.length > 0) sources.push(...ddgData.sources);
            }

            // Nutricion si aplica
            if (query.toLowerCase().match(/proteina|calorias|nutricion|nutrientes|vitamina|grasa|carbohidrato|mineral|alimento|comida|comer|dieta|pollo|carne|pescado|fruta|verdura/)) {
                const nutritionData = await fetchNutrition(query);
                if (nutritionData.content) {
                    contextData += `\n\nDATOS NUTRICIONALES (USDA):\n${nutritionData.content}`;
                    sources.push(...nutritionData.sources);
                }
            }

            // Paso 2: Generar respuesta con IA
            updateTypingStatus('Procesando con IA...');
            let aiResponse = await generateWithAI(query, contextData);

            return {
                text: aiResponse,
                sources: sources.slice(0, 4)
            };
        }

        function enrichQueryWithContext(query) {
            // Si el usuario hace una pregunta de seguimiento, enriquecerla con contexto
            const msg = query.toLowerCase();
            
            if (conversationContext.lastTopic && msg.match(/^(y |pero |entonces |tambien |ademas |que mas |mas sobre)/)) {
                return `${conversationContext.lastTopic}: ${query}`;
            }
            
            // Buscar referencias a conversacion anterior
            if (msg.match(/lo anterior|eso|esto|el tema|lo que dijiste/) && conversationHistory.length > 2) {
                const lastAssistant = conversationHistory.filter(h => h.role === 'assistant').pop();
                if (lastAssistant) {
                    // Extraer tema principal de la ultima respuesta
                    const firstLine = lastAssistant.content.split('\n')[0].substring(0, 100);
                    return `${query} (Contexto: ${firstLine})`;
                }
            }

            return query;
        }

        async function generateWithAI(query, context) {
            const historyText = conversationHistory.slice(-6).map(h => 
                `${h.role === 'user' ? 'Usuario' : 'Pisi'}: ${h.content.substring(0, 200)}`
            ).join('\n');

            const systemPrompt = `Eres Pisi, un asistente de inteligencia artificial amigable y profesional.

REGLAS:
1. Responde SIEMPRE en espanol
2. NO uses emojis
3. Se conciso pero completo
4. Usa **negritas** para puntos importantes
5. Si tienes datos del contexto, usalos
6. Mantén un tono conversacional pero informativo
7. Si no tienes suficiente informacion, di honestamente que no encontraste datos y sugiere reformular la pregunta`;

            const prompt = `${systemPrompt}

CONVERSACION PREVIA:
${historyText}

INFORMACION ENCONTRADA:
${context || 'No se encontro informacion especifica.'}

PREGUNTA: ${query}

Responde de forma clara y util:`;

            // Intentar con Mixtral
            try {
                const response = await fetch('https://api-inference.huggingface.co/models/mistralai/Mixtral-8x7B-Instruct-v0.1', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        inputs: `<s>[INST] ${prompt} [/INST]`,
                        parameters: { max_new_tokens: 800, temperature: 0.7, return_full_text: false }
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data[0]?.generated_text) {
                        let text = cleanAIResponse(data[0].generated_text);
                        if (text.length > 50) return text;
                    }
                }
            } catch (e) {
                console.log('Mixtral error:', e);
            }

            // Intentar Zephyr
            try {
                const response = await fetch('https://api-inference.huggingface.co/models/HuggingFaceH4/zephyr-7b-beta', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        inputs: `<|system|>${systemPrompt}</s><|user|>${query}\n\nContexto: ${context?.substring(0, 1500) || 'Sin datos adicionales'}</s><|assistant|>`,
                        parameters: { max_new_tokens: 600, temperature: 0.7, return_full_text: false }
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data[0]?.generated_text) {
                        let text = cleanAIResponse(data[0].generated_text);
                        if (text.length > 50) return text;
                    }
                }
            } catch (e) {
                console.log('Zephyr error:', e);
            }

            // Fallback: usar contexto directamente
            return processContextAsResponse(query, context);
        }

        function cleanAIResponse(text) {
            text = text.replace(/^\[\/INST\]\s*/g, '');
            text = text.replace(/<\|.*?\|>/g, '');
            text = text.replace(/^(assistant|Pisi|AI):\s*/gi, '');
            text = text.replace(/[\u{1F600}-\u{1F64F}]|[\u{1F300}-\u{1F5FF}]|[\u{1F680}-\u{1F6FF}]|[\u{1F1E0}-\u{1F1FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]/gu, '');
            return text.trim();
        }

        function processContextAsResponse(query, context) {
            if (!context || context.length < 100) {
                return `No encontre suficiente informacion sobre "${query}". Podrias reformular tu pregunta o ser mas especifico? Estoy aqui para ayudarte.`;
            }

            // Extraer y limpiar informacion relevante
            let response = '';
            
            const wikiMatch = context.match(/WIKIPEDIA:\n([\s\S]*?)(?=\n\n[A-Z]|$)/);
            if (wikiMatch) {
                const content = wikiMatch[1].trim().split('\n\n').filter(p => p.length > 30).slice(0, 3);
                response = content.join('\n\n');
            }

            const nutritionMatch = context.match(/DATOS NUTRICIONALES[\s\S]*?:\n([\s\S]*?)(?=\n\n[A-Z]|$)/);
            if (nutritionMatch) {
                response += '\n\n**Datos Nutricionales:**\n' + nutritionMatch[1].trim();
            }

            if (response.length < 50) {
                const ddgMatch = context.match(/INFORMACION ADICIONAL:\n([\s\S]*?)(?=\n\n[A-Z]|$)/);
                if (ddgMatch) {
                    response = ddgMatch[1].trim().substring(0, 800);
                }
            }

            return response || `No encontre informacion especifica. Intenta con otra pregunta.`;
        }

        async function fetchWikipedia(query) {
            const result = { content: '', sources: [] };
            
            try {
                const searchUrl = `https://es.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=2`;
                const searchResponse = await fetch(searchUrl);
                const searchData = await searchResponse.json();

                if (searchData.query?.search?.length > 0) {
                    for (const item of searchData.query.search.slice(0, 2)) {
                        const contentUrl = `https://es.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(item.title)}&prop=extracts&explaintext=true&format=json&origin=*&exsectionformat=plain`;
                        const contentResponse = await fetch(contentUrl);
                        const contentData = await contentResponse.json();
                        
                        const pages = contentData.query?.pages;
                        if (pages) {
                            const pageId = Object.keys(pages)[0];
                            if (pageId !== '-1' && pages[pageId].extract) {
                                result.content += pages[pageId].extract.substring(0, 1500) + '\n\n';
                                result.sources.push({
                                    name: `Wikipedia: ${item.title}`,
                                    url: `https://es.wikipedia.org/wiki/${encodeURIComponent(item.title.replace(/ /g, '_'))}`
                                });
                            }
                        }
                    }
                }

                if (!result.content) {
                    const searchUrlEn = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=1`;
                    const searchResponseEn = await fetch(searchUrlEn);
                    const searchDataEn = await searchResponseEn.json();

                    if (searchDataEn.query?.search?.length > 0) {
                        const item = searchDataEn.query.search[0];
                        const contentUrl = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(item.title)}&prop=extracts&exintro=true&explaintext=true&format=json&origin=*`;
                        const contentResponse = await fetch(contentUrl);
                        const contentData = await contentResponse.json();
                        
                        const pages = contentData.query?.pages;
                        if (pages) {
                            const pageId = Object.keys(pages)[0];
                            if (pageId !== '-1' && pages[pageId].extract) {
                                result.content = pages[pageId].extract.substring(0, 1200);
                                result.sources.push({
                                    name: `Wikipedia (EN): ${item.title}`,
                                    url: `https://en.wikipedia.org/wiki/${encodeURIComponent(item.title.replace(/ /g, '_'))}`
                                });
                            }
                        }
                    }
                }
            } catch (e) {
                console.log('Wikipedia error:', e);
            }

            return result;
        }

        async function fetchDuckDuckGo(query) {
            const result = { content: '', sources: [] };
            
            try {
                const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.Abstract && data.Abstract.length > 30) {
                    result.content = data.Abstract;
                    if (data.AbstractURL) {
                        result.sources.push({ name: data.AbstractSource || 'Fuente', url: data.AbstractURL });
                    }
                }

                if (data.Infobox?.content?.length > 0) {
                    result.content += '\n\nDatos:\n';
                    data.Infobox.content.slice(0, 6).forEach(item => {
                        if (item.label && item.value) {
                            result.content += `- ${item.label}: ${item.value}\n`;
                        }
                    });
                }
            } catch (e) {
                console.log('DuckDuckGo error:', e);
            }

            return result;
        }

        async function fetchNutrition(query) {
            const result = { content: '', sources: [] };
            
            try {
                const foodTerms = query.toLowerCase()
                    .replace(/proteina|calorias|nutricion|nutrientes|vitaminas|cuanta|cuanto|tiene|del|de|en|el|la|los|las|que|como|cual|cuales|pollo/g, '')
                    .trim() || 'chicken';

                const searchTerm = query.toLowerCase().includes('pollo') ? 'chicken breast' : foodTerms;

                const url = `https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(searchTerm)}&pageSize=1&api_key=DEMO_KEY`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.foods?.length > 0) {
                    const food = data.foods[0];
                    result.content = `**${food.description}**\n\nPor cada 100g:\n`;

                    const nutrients = food.foodNutrients || [];
                    const translations = {
                        'Energy': 'Energia',
                        'Protein': 'Proteina',
                        'Total lipid': 'Grasa total',
                        'Carbohydrate': 'Carbohidratos',
                        'Fiber': 'Fibra',
                        'Calcium': 'Calcio',
                        'Iron': 'Hierro',
                        'Sodium': 'Sodio',
                        'Vitamin C': 'Vitamina C',
                        'Vitamin D': 'Vitamina D',
                        'Cholesterol': 'Colesterol',
                        'Potassium': 'Potasio',
                        'Magnesium': 'Magnesio'
                    };

                    nutrients.forEach(nutrient => {
                        for (const [eng, esp] of Object.entries(translations)) {
                            if (nutrient.nutrientName?.includes(eng)) {
                                result.content += `- ${esp}: ${nutrient.value} ${nutrient.unitName}\n`;
                                break;
                            }
                        }
                    });

                    result.sources.push({
                        name: 'USDA FoodData Central',
                        url: 'https://fdc.nal.usda.gov/'
                    });
                }
            } catch (e) {
                console.log('Nutrition error:', e);
            }

            return result;
        }
