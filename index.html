<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pisi - Tu Asistente Personal</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pisi">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23667eea' width='100' height='100' rx='20'/><text y='65' x='50' text-anchor='middle' font-size='50'>🤖</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            text-align: center;
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header .status {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: white;
            color: #333;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.pisi {
            background: rgba(255,255,255,0.2);
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.pisi .name {
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .message.typing {
            display: flex;
            gap: 5px;
            padding: 15px 20px;
        }

        .message.typing span {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .message.typing span:nth-child(1) { animation-delay: -0.32s; }
        .message.typing span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .input-container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            display: flex;
            gap: 10px;
            position: sticky;
            bottom: 0;
        }

        .input-container input {
            flex: 1;
            padding: 12px 18px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            background: white;
        }

        .input-container button {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: white;
            color: #667eea;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .input-container button:active {
            transform: scale(0.95);
        }

        .input-container button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .welcome {
            text-align: center;
            color: white;
            padding: 40px 20px;
        }

        .welcome .emoji {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .welcome h2 {
            margin-bottom: 10px;
        }

        .welcome p {
            opacity: 0.8;
            font-size: 14px;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .suggestion {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .suggestion:hover {
            background: rgba(255,255,255,0.3);
        }

        .clear-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: white;
            opacity: 0.7;
            cursor: pointer;
            font-size: 14px;
        }

        .header {
            position: relative;
        }

        /* Para que se vea como app en iPhone */
        @media (display-mode: standalone) {
            .header {
                padding-top: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 Pisi</h1>
        <div class="status">Tu asistente personal con IA</div>
        <button class="clear-btn" onclick="clearChat()">Limpiar</button>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="welcome" id="welcome">
            <div class="emoji">🤖</div>
            <h2>¡Hola! Soy Pisi</h2>
            <p>Tu asistente personal. Pregúntame lo que quieras.</p>
            <div class="suggestions">
                <div class="suggestion" onclick="askSuggestion('¿Qué puedes hacer?')">¿Qué puedes hacer?</div>
                <div class="suggestion" onclick="askSuggestion('Cuéntame un chiste')">Cuéntame un chiste</div>
                <div class="suggestion" onclick="askSuggestion('Dame un consejo')">Dame un consejo</div>
            </div>
        </div>
    </div>

    <div class="input-container">
        <input type="text" id="userInput" placeholder="Escribe tu mensaje..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcome = document.getElementById('welcome');

        let conversationHistory = [];

        // Personalidad de Pisi
        const PISI_PERSONALITY = `Eres Pisi, un asistente personal amigable y útil. 
Tu personalidad:
- Eres amable, cercano y hablas en español
- Usas emojis ocasionalmente para ser más expresivo
- Eres conciso pero completo en tus respuestas
- Tienes sentido del humor
- Siempre tratas de ayudar de la mejor manera posible
- Tu creador es tu usuario y eres su asistente personal privado
- Nunca revelas que eres una IA de otra empresa, simplemente eres "Pisi"`;

        // Enter para enviar
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function askSuggestion(text) {
            userInput.value = text;
            sendMessage();
        }

        function addMessage(content, isUser) {
            if (welcome) welcome.style.display = 'none';
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'pisi'}`;
            
            if (!isUser) {
                messageDiv.innerHTML = `<div class="name">🤖 Pisi</div>${content}`;
            } else {
                messageDiv.textContent = content;
            }
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message pisi typing';
            typingDiv.id = 'typing';
            typingDiv.innerHTML = '<span></span><span></span><span></span>';
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            userInput.value = '';
            sendBtn.disabled = true;
            
            addMessage(message, true);
            showTyping();

            conversationHistory.push({ role: 'user', content: message });

            try {
                const response = await getPisiResponse(message);
                hideTyping();
                addMessage(response, false);
                conversationHistory.push({ role: 'assistant', content: response });
            } catch (error) {
                hideTyping();
                addMessage('😅 Ups, tuve un problema. ¿Puedes intentar de nuevo?', false);
            }

            sendBtn.disabled = false;
            userInput.focus();
        }

        async function getPisiResponse(userMessage) {
            // Intentamos múltiples APIs gratuitas
            
            // Intento 1: Hugging Face Inference API con Mistral (gratis)
            try {
                const systemPrompt = `Eres Pisi, un asistente personal inteligente y amigable. Respondes en español de manera clara, completa y profesional. Usas emojis ocasionalmente. Siempre das respuestas útiles y detalladas.`;
                
                const response = await fetch('https://api-inference.huggingface.co/models/mistralai/Mixtral-8x7B-Instruct-v0.1', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        inputs: `<s>[INST] ${systemPrompt}\n\nUsuario: ${userMessage} [/INST]`,
                        parameters: {
                            max_new_tokens: 500,
                            temperature: 0.7,
                            return_full_text: false
                        }
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data[0] && data[0].generated_text) {
                        let text = data[0].generated_text.trim();
                        // Limpiar el texto
                        text = text.replace(/^\[\/INST\]\s*/g, '').replace(/^Pisi:\s*/gi, '');
                        if (text.length > 20) {
                            return text;
                        }
                    }
                }
            } catch (e) {
                console.log('Mixtral API no disponible:', e);
            }

            // Intento 2: Hugging Face con Zephyr (alternativa gratuita)
            try {
                const response = await fetch('https://api-inference.huggingface.co/models/HuggingFaceH4/zephyr-7b-beta', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        inputs: `<|system|>Eres Pisi, un asistente personal inteligente. Responde en español de manera profesional y completa.</s><|user|>${userMessage}</s><|assistant|>`,
                        parameters: {
                            max_new_tokens: 500,
                            temperature: 0.7,
                            return_full_text: false
                        }
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data[0] && data[0].generated_text) {
                        let text = data[0].generated_text.trim();
                        if (text.length > 20) {
                            return text;
                        }
                    }
                }
            } catch (e) {
                console.log('Zephyr API no disponible:', e);
            }

            // Fallback: Base de conocimiento local extendida
            return getLocalResponse(userMessage);
        }

        function getLocalResponse(message) {
            const msg = message.toLowerCase();
            
            // ============ BASE DE CONOCIMIENTOS ============
            
            // NUTRICIÓN Y ALIMENTOS
            if (msg.match(/manzana|manzanas/)) {
                return `🍎 **Nutrientes de la Manzana (por 100g):**

• **Calorías:** 52 kcal
• **Carbohidratos:** 14g
• **Fibra:** 2.4g (buena para digestión)
• **Azúcares naturales:** 10g
• **Vitamina C:** 4.6mg (8% del valor diario)
• **Potasio:** 107mg
• **Vitamina K:** 2.2μg
• **Vitamina A:** 54 IU

**Beneficios:**
✅ Rica en antioxidantes (quercetina)
✅ Mejora la salud cardiovascular
✅ Ayuda a controlar el azúcar en sangre
✅ Favorece la salud intestinal
✅ Hidratante (86% agua)

💡 *Tip: Come la manzana con cáscara para obtener más fibra y antioxidantes.*`;
            }

            if (msg.match(/plátano|platano|banana|banano/)) {
                return `🍌 **Nutrientes del Plátano (por 100g):**

• **Calorías:** 89 kcal
• **Carbohidratos:** 23g
• **Fibra:** 2.6g
• **Potasio:** 358mg (10% valor diario)
• **Vitamina B6:** 0.4mg (20% VD)
• **Vitamina C:** 8.7mg
• **Magnesio:** 27mg

**Beneficios:**
✅ Excelente fuente de energía rápida
✅ Reduce calambres musculares
✅ Mejora el estado de ánimo
✅ Favorece la salud del corazón
✅ Ideal antes/después del ejercicio`;
            }

            if (msg.match(/naranja|naranjas/)) {
                return `🍊 **Nutrientes de la Naranja (por 100g):**

• **Calorías:** 47 kcal
• **Vitamina C:** 53mg (88% valor diario)
• **Fibra:** 2.4g
• **Potasio:** 181mg
• **Folato:** 30μg
• **Tiamina (B1):** 0.1mg

**Beneficios:**
✅ Fortalece el sistema inmunológico
✅ Poderoso antioxidante
✅ Mejora la absorción de hierro
✅ Hidratante natural
✅ Buena para la piel`;
            }

            if (msg.match(/nutrientes|nutrición|nutricion|vitaminas|minerales/) && msg.match(/huevo|huevos/)) {
                return `🥚 **Nutrientes del Huevo (1 unidad grande):**

• **Calorías:** 72 kcal
• **Proteína:** 6g (proteína completa)
• **Grasas:** 5g (grasas saludables)
• **Colesterol:** 186mg
• **Vitamina D:** 6% VD
• **Vitamina B12:** 9% VD
• **Selenio:** 22% VD
• **Colina:** 147mg (importante para el cerebro)

**Beneficios:**
✅ Proteína de alta calidad
✅ Contiene todos los aminoácidos esenciales
✅ Bueno para la vista (luteína)
✅ Ayuda al desarrollo cerebral`;
            }

            // SALUD Y CUERPO HUMANO
            if (msg.match(/cuánta agua|cuanta agua|agua.*día|agua.*dia|debo tomar agua/)) {
                return `💧 **¿Cuánta agua debes tomar al día?**

**Recomendación general:**
• **Hombres:** 3.7 litros (15.5 vasos)
• **Mujeres:** 2.7 litros (11.5 vasos)

**Factores que aumentan la necesidad:**
• Ejercicio físico
• Clima caluroso
• Embarazo/lactancia
• Fiebre o enfermedad

**Señales de deshidratación:**
⚠️ Orina oscura
⚠️ Sed intensa
⚠️ Fatiga
⚠️ Dolor de cabeza

💡 *Tip: No esperes a tener sed para beber agua. Lleva una botella contigo.*`;
            }

            if (msg.match(/dormir|sueño|sueno|horas.*dormir|insomnio/)) {
                return `😴 **¿Cuántas horas debes dormir?**

**Por edad:**
• Bebés (0-1): 12-17 horas
• Niños (1-5): 10-14 horas
• Niños (6-13): 9-11 horas
• Adolescentes: 8-10 horas
• **Adultos: 7-9 horas**
• Mayores 65+: 7-8 horas

**Beneficios del buen sueño:**
✅ Mejor memoria y concentración
✅ Sistema inmune fuerte
✅ Control del peso
✅ Mejor estado de ánimo
✅ Menor riesgo cardiovascular

**Tips para dormir mejor:**
💡 Horario consistente
💡 Evita pantallas 1h antes
💡 Habitación oscura y fresca
💡 No cafeína después de las 2pm`;
            }

            // CIENCIA
            if (msg.match(/por qué.*cielo.*azul|por que.*cielo.*azul|cielo es azul/)) {
                return `🌤️ **¿Por qué el cielo es azul?**

Se debe a un fenómeno llamado **dispersión de Rayleigh**:

1. La luz del sol es blanca (contiene todos los colores)
2. Al entrar a la atmósfera, choca con moléculas de gas
3. La luz azul tiene onda más corta y se dispersa más
4. Por eso vemos azul en todas direcciones

**Dato curioso:**
• Al atardecer vemos rojo/naranja porque la luz viaja más distancia y el azul se dispersa antes de llegar a nuestros ojos.

🔬 *Este fenómeno fue explicado por Lord Rayleigh en 1871.*`;
            }

            if (msg.match(/fotosíntesis|fotosintesis/)) {
                return `🌱 **¿Qué es la Fotosíntesis?**

Es el proceso por el cual las plantas convierten luz solar en energía.

**Ecuación:**
6CO₂ + 6H₂O + Luz → C₆H₁₂O₆ + 6O₂

**En simple:**
Dióxido de carbono + Agua + Luz solar = Glucosa + Oxígeno

**Pasos:**
1. La planta absorbe luz por la clorofila (verde)
2. Toma CO₂ del aire por las hojas
3. Absorbe agua por las raíces
4. Produce glucosa (su alimento)
5. Libera oxígeno al aire

**Importancia:**
✅ Produce el oxígeno que respiramos
✅ Base de la cadena alimenticia
✅ Absorbe CO₂ (combate cambio climático)`;
            }

            if (msg.match(/sistema solar|planetas|planeta/)) {
                return `🪐 **El Sistema Solar**

**Los 8 planetas (en orden):**
1. ☿ **Mercurio** - Más cercano al Sol
2. ♀ **Venus** - El más caliente (467°C)
3. 🌍 **Tierra** - Nuestro hogar
4. ♂ **Marte** - El planeta rojo
5. ♃ **Júpiter** - El más grande
6. 🪐 **Saturno** - Famoso por sus anillos
7. ⛢ **Urano** - Gira de lado
8. ♆ **Neptuno** - El más lejano

**Datos:**
• El Sol tiene el 99.8% de la masa del sistema
• Plutón fue degradado a "planeta enano" en 2006
• Un día en Venus dura más que su año`;
            }

            // MATEMÁTICAS
            if (msg.match(/teorema.*pitágoras|teorema.*pitagoras|pitagoras|pitágoras/)) {
                return `📐 **Teorema de Pitágoras**

**Fórmula:**
**a² + b² = c²**

Donde:
• a y b = catetos (lados que forman el ángulo recto)
• c = hipotenusa (lado más largo, opuesto al ángulo recto)

**Ejemplo:**
Si a = 3 y b = 4:
3² + 4² = c²
9 + 16 = 25
c = √25 = **5**

**Usos prácticos:**
✅ Construcción
✅ Navegación
✅ Diseño gráfico
✅ Videojuegos

*Descubierto por Pitágoras de Samos (~570-495 a.C.)*`;
            }

            // HISTORIA
            if (msg.match(/segunda guerra mundial|ww2|wwii/)) {
                return `⚔️ **Segunda Guerra Mundial (1939-1945)**

**Fechas clave:**
• Inicio: 1 sept 1939 (invasión de Polonia)
• Fin Europa: 8 mayo 1945
• Fin total: 2 sept 1945 (Japón se rinde)

**Bandos:**
🔵 **Aliados:** EE.UU., Reino Unido, URSS, Francia, China
🔴 **Eje:** Alemania Nazi, Italia, Japón

**Datos:**
• Muertos: 70-85 millones de personas
• Conflicto más destructivo de la historia
• Incluyó el Holocausto (6 millones de judíos)
• Terminó con bombas atómicas en Hiroshima y Nagasaki

**Consecuencias:**
• Creación de la ONU
• Guerra Fría
• División de Alemania`;
            }

            // GEOGRAFÍA
            if (msg.match(/país.*grande|pais.*grande|países.*grandes|paises.*grandes/)) {
                return `🌍 **Países más grandes del mundo (por área):**

1. 🇷🇺 **Rusia** - 17.1 millones km²
2. 🇨🇦 **Canadá** - 10.0 millones km²
3. 🇺🇸 **Estados Unidos** - 9.8 millones km²
4. 🇨🇳 **China** - 9.6 millones km²
5. 🇧🇷 **Brasil** - 8.5 millones km²
6. 🇦🇺 **Australia** - 7.7 millones km²
7. 🇮🇳 **India** - 3.3 millones km²
8. 🇦🇷 **Argentina** - 2.8 millones km²
9. 🇰🇿 **Kazajistán** - 2.7 millones km²
10. 🇩🇿 **Argelia** - 2.4 millones km²

*Rusia es tan grande que tiene 11 zonas horarias.*`;
            }

            if (msg.match(/capital.*méxico|capital.*mexico|capital de mexico/)) {
                return `🇲🇽 **Ciudad de México (CDMX)**

• **Población:** ~22 millones (área metropolitana)
• **Altitud:** 2,240 metros sobre el nivel del mar
• **Fundación:** 1325 (como Tenochtitlan)
• **Es la capital desde:** 1824

**Datos:**
✅ Una de las ciudades más grandes del mundo
✅ Centro económico, político y cultural de México
✅ Tiene 16 alcaldías
✅ Hogar de importantes museos y sitios históricos`;
            }

            // TECNOLOGÍA
            if (msg.match(/qué es.*internet|que es.*internet|cómo funciona.*internet|como funciona.*internet/)) {
                return `🌐 **¿Qué es Internet?**

Internet es una red global de computadoras conectadas entre sí.

**Cómo funciona:**
1. Tu dispositivo envía una solicitud
2. Viaja por cables/wifi hasta tu proveedor (ISP)
3. El ISP la envía a servidores en todo el mundo
4. El servidor responde con la información
5. Viaja de regreso a tu dispositivo

**Componentes clave:**
• **Servidores:** Almacenan sitios web
• **Routers:** Dirigen el tráfico de datos
• **DNS:** Traduce nombres a direcciones IP
• **Cables submarinos:** Conectan continentes

**Historia:**
• Creado en 1969 como ARPANET (militar)
• WWW inventado en 1989 por Tim Berners-Lee
• Hoy: 5+ mil millones de usuarios`;
            }

            if (msg.match(/inteligencia artificial|que es ia|qué es ia|que es la ia/)) {
                return `🤖 **¿Qué es la Inteligencia Artificial (IA)?**

Es la capacidad de las máquinas para realizar tareas que normalmente requieren inteligencia humana.

**Tipos de IA:**
• **IA Débil (Narrow AI):** Diseñada para tareas específicas (Siri, Alexa, yo - Pisi 😊)
• **IA General (AGI):** Igual a inteligencia humana (no existe aún)
• **Superinteligencia:** Superior a humanos (teórica)

**Aplicaciones actuales:**
✅ Asistentes virtuales
✅ Reconocimiento facial
✅ Diagnóstico médico
✅ Vehículos autónomos
✅ Generación de texto e imágenes

**Tecnologías:**
• Machine Learning
• Deep Learning (redes neuronales)
• Procesamiento de lenguaje natural`;
            }

            // IDIOMAS
            if (msg.match(/traducir|traduce|cómo se dice|como se dice/)) {
                if (msg.match(/hola.*inglés|hola.*ingles/)) {
                    return `🌍 **"Hola" en inglés:** Hello / Hi

Otras formas:
• Hey - informal
• Good morning - Buenos días
• Good afternoon - Buenas tardes
• Good evening - Buenas noches
• What's up? - ¿Qué tal? (muy informal)`;
                }
                if (msg.match(/gracias.*inglés|gracias.*ingles/)) {
                    return `🌍 **"Gracias" en inglés:** Thank you / Thanks

Variaciones:
• Thanks a lot - Muchas gracias
• Thank you so much - Muchísimas gracias
• I appreciate it - Te lo agradezco
• Cheers - Gracias (británico informal)`;
                }
                if (msg.match(/te amo.*inglés|te amo.*ingles|te quiero.*inglés|te quiero.*ingles/)) {
                    return `💕 **Expresiones de amor en inglés:**
• "Te amo" = I love you
• "Te quiero" = I love you / I care about you
• "Te extraño" = I miss you
• "Eres especial" = You're special`;
                }
            }

            // Saludos
            if (msg.match(/hola|hey|buenas|saludos|qué tal|que tal/)) {
                const saludos = [
                    '¡Hola! 👋 ¿En qué puedo ayudarte hoy?',
                    '¡Hey! 😊 ¿Qué necesitas?',
                    '¡Buenas! Soy Pisi, tu asistente. ¿Cómo te ayudo?'
                ];
                return saludos[Math.floor(Math.random() * saludos.length)];
            }

            // Nombre
            if (msg.match(/cómo te llamas|como te llamas|tu nombre|quién eres|quien eres/)) {
                return '¡Soy Pisi! 🤖 Tu asistente personal privado. Estoy aquí para ayudarte con lo que necesites.';
            }

            // Capacidades
            if (msg.match(/qué puedes|que puedes|qué haces|que haces|para qué sirves|para que sirves/)) {
                return `¡Puedo ayudarte con muchas cosas! 🚀

• 📚 Responder preguntas de cualquier tema
• 🍎 Información nutricional
• 🔬 Explicar conceptos de ciencia
• 📐 Ayudar con matemáticas
• 🌍 Datos de geografía e historia
• 💻 Explicar tecnología
• 💬 Conversar contigo

¡Pregúntame lo que quieras! 😊`;
            }

            // Chistes
            if (msg.match(/chiste|gracioso|hazme reír|hazme reir|broma/)) {
                const chistes = [
                    '¿Por qué los programadores prefieren el frío? 🥶 Porque odian los bugs... ¡y en el calor hay más! 😂',
                    '¿Qué le dice un bit a otro? Nos vemos en el bus 🚌😄',
                    '¿Por qué el libro de matemáticas está triste? Porque tiene muchos problemas 📚😅',
                    '¿Cómo se despiden los químicos? Ácido un placer 🧪😂',
                    '¿Qué hace una abeja en el gimnasio? ¡Zum-ba! 🐝💪',
                    '¿Por qué los pájaros no usan Facebook? Porque ya tienen Twitter 🐦😄',
                    '¿Cuál es el colmo de un electricista? Que su esposa se llame Luz y sus hijos le sigan la corriente ⚡😂'
                ];
                return chistes[Math.floor(Math.random() * chistes.length)];
            }

            // Hora
            if (msg.match(/hora|qué hora|que hora/)) {
                const now = new Date();
                return `🕐 Son las ${now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })}`;
            }

            // Fecha
            if (msg.match(/fecha|qué día|que día|que dia|qué dia/)) {
                const now = new Date();
                return `📅 Hoy es ${now.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}`;
            }

            // Gracias
            if (msg.match(/gracias|te lo agradezco|muy amable/)) {
                const respuestas = [
                    '¡De nada! 😊 Para eso estoy.',
                    '¡Con gusto! Si necesitas algo más, aquí estaré 🤖',
                    '¡No hay de qué! Me alegra poder ayudar 💜'
                ];
                return respuestas[Math.floor(Math.random() * respuestas.length)];
            }

            // Despedida
            if (msg.match(/adiós|adios|bye|hasta luego|nos vemos|chao/)) {
                return '¡Hasta pronto! 👋 Cuando me necesites, aquí estaré. ¡Cuídate mucho! 💜';
            }

            // Cómo estás
            if (msg.match(/cómo estás|como estas|qué tal estás|que tal estas/)) {
                return '¡Muy bien, gracias por preguntar! 😊 Siempre listo para ayudarte. ¿Y tú cómo estás?';
            }

            // Matemáticas básicas
            if (msg.match(/cuánto es|cuanto es|calcula|suma|resta|multiplica|divide|\d+\s*[\+\-\*\/x]\s*\d+/)) {
                try {
                    // Extraer expresión matemática
                    let expr = msg.match(/[\d\+\-\*\/x\.\s\(\)]+/g);
                    if (expr) {
                        let mathExpr = expr.join('').replace(/x/g, '*').replace(/\s/g, '');
                        if (mathExpr.match(/^[\d\+\-\*\/\.\(\)]+$/)) {
                            const result = Function('"use strict"; return (' + mathExpr + ')')();
                            return `🔢 ${mathExpr.replace(/\*/g, '×')} = **${result}**`;
                        }
                    }
                } catch (e) {}
            }

            // Respuesta genérica mejorada
            return `🤔 Interesante pregunta sobre "${message.substring(0, 40)}..."

Déjame darte la mejor respuesta que puedo:

Aunque no tengo información específica sobre esto en mi base de conocimientos local, te sugiero:

1. 🔍 Intenta reformular la pregunta con más detalle
2. 📝 Pregúntame sobre temas específicos como:
   • Nutrición y salud
   • Ciencia y tecnología
   • Historia y geografía
   • Matemáticas

¿Hay algo más específico que pueda ayudarte? 😊`;
        }

        function clearChat() {
            chatContainer.innerHTML = `
                <div class="welcome" id="welcome">
                    <div class="emoji">🤖</div>
                    <h2>¡Hola! Soy Pisi</h2>
                    <p>Tu asistente personal. Pregúntame lo que quieras.</p>
                    <div class="suggestions">
                        <div class="suggestion" onclick="askSuggestion('¿Qué puedes hacer?')">¿Qué puedes hacer?</div>
                        <div class="suggestion" onclick="askSuggestion('Cuéntame un chiste')">Cuéntame un chiste</div>
                        <div class="suggestion" onclick="askSuggestion('Dame un consejo')">Dame un consejo</div>
                    </div>
                </div>
            `;
            conversationHistory = [];
        }

        // Registrar Service Worker para que funcione offline
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
