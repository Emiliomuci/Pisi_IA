<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pisi - Asistente con IA</title>
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pisi">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            text-align: center;
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header h1 { font-size: 22px; font-weight: 600; }
        .header .status { font-size: 11px; opacity: 0.7; margin-top: 4px; }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 92%;
            padding: 12px 16px;
            border-radius: 16px;
            animation: fadeIn 0.3s ease;
            line-height: 1.6;
            font-size: 15px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: #4a6cf7;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.pisi {
            background: rgba(255,255,255,0.1);
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.pisi .name {
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 8px;
            color: #4a6cf7;
        }

        .message.typing {
            display: flex;
            gap: 5px;
            padding: 18px 22px;
        }

        .message.typing span {
            width: 8px;
            height: 8px;
            background: #4a6cf7;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .message.typing span:nth-child(1) { animation-delay: -0.32s; }
        .message.typing span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .input-container {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            display: flex;
            gap: 10px;
            position: sticky;
            bottom: 0;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .input-container input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .input-container input::placeholder { color: rgba(255,255,255,0.5); }

        .input-container button {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: #4a6cf7;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .input-container button:disabled { opacity: 0.5; }

        .welcome {
            text-align: center;
            color: white;
            padding: 30px 20px;
        }

        .welcome .icon {
            font-size: 36px;
            background: linear-gradient(135deg, #4a6cf7, #7c3aed);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-weight: bold;
        }

        .welcome p { opacity: 0.7; font-size: 13px; margin-top: 8px; }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 15px;
        }

        .suggestion {
            background: rgba(74, 108, 247, 0.3);
            color: white;
            padding: 8px 14px;
            border-radius: 18px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid rgba(74, 108, 247, 0.5);
        }

        .clear-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: white;
            opacity: 0.7;
            cursor: pointer;
            font-size: 13px;
        }

        .header { position: relative; }

        @media (display-mode: standalone) {
            .header { padding-top: 45px; }
        }

        .message-content { white-space: pre-wrap; }
        .message-content strong { color: #6d8cff; }
        
        .source-link {
            display: block;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-size: 12px;
            color: #8b9dff;
        }
        
        .source-link a {
            color: #8b9dff;
            text-decoration: none;
        }
        
        .source-link a:hover {
            text-decoration: underline;
        }

        .searching {
            font-size: 12px;
            color: #8b9dff;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Pisi</h1>
        <div class="status">Busqueda en internet activada</div>
        <button class="clear-btn" onclick="clearChat()">Limpiar</button>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="welcome" id="welcome">
            <div class="icon">P</div>
            <h2>Hola, soy Pisi</h2>
            <p>Busco informacion en internet y te muestro las fuentes oficiales.</p>
            <div class="suggestions">
                <div class="suggestion" onclick="askSuggestion('Proteina en pechuga de pollo')">Nutricion</div>
                <div class="suggestion" onclick="askSuggestion('Albert Einstein')">Biografias</div>
                <div class="suggestion" onclick="askSuggestion('Segunda Guerra Mundial')">Historia</div>
                <div class="suggestion" onclick="askSuggestion('Sistema solar')">Ciencia</div>
            </div>
        </div>
    </div>

    <div class="input-container">
        <input type="text" id="userInput" placeholder="Pregunta lo que quieras..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">&#10148;</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcome = document.getElementById('welcome');

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function askSuggestion(text) {
            userInput.value = text;
            sendMessage();
        }

        function addMessage(content, isUser, sources = null) {
            if (welcome) welcome.style.display = 'none';
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'pisi'}`;
            
            if (!isUser) {
                let sourceHTML = '';
                if (sources && sources.length > 0) {
                    sourceHTML = '<div class="source-link"><strong>Fuentes:</strong><br>';
                    sources.forEach(s => {
                        sourceHTML += `<a href="${s.url}" target="_blank">${s.name}</a><br>`;
                    });
                    sourceHTML += '</div>';
                }
                messageDiv.innerHTML = `<div class="name">Pisi</div><div class="message-content">${formatResponse(content)}</div>${sourceHTML}`;
            } else {
                messageDiv.textContent = content;
            }
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function formatResponse(text) {
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        function showTyping(searchingText = '') {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message pisi typing';
            typingDiv.id = 'typing';
            typingDiv.innerHTML = `<span></span><span></span><span></span>${searchingText ? `<div class="searching">${searchingText}</div>` : ''}`;
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function updateTypingText(text) {
            const typing = document.getElementById('typing');
            if (typing) {
                let searching = typing.querySelector('.searching');
                if (!searching) {
                    searching = document.createElement('div');
                    searching.className = 'searching';
                    typing.appendChild(searching);
                }
                searching.textContent = text;
            }
        }

        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            userInput.value = '';
            sendBtn.disabled = true;
            
            addMessage(message, true);
            showTyping('Buscando en internet...');

            try {
                const response = await searchAndRespond(message);
                hideTyping();
                addMessage(response.text, false, response.sources);
            } catch (error) {
                hideTyping();
                addMessage('Error al buscar informacion. Intenta de nuevo.', false);
            }

            sendBtn.disabled = false;
            userInput.focus();
        }

        async function searchAndRespond(query) {
            // Buscar en Wikipedia (fuente oficial y gratuita)
            const wikiResult = await searchWikipedia(query);
            
            if (wikiResult.found) {
                return {
                    text: wikiResult.content,
                    sources: wikiResult.sources
                };
            }

            // Si no encuentra en Wikipedia, buscar en DuckDuckGo
            const ddgResult = await searchDuckDuckGo(query);
            
            if (ddgResult.found) {
                return {
                    text: ddgResult.content,
                    sources: ddgResult.sources
                };
            }

            // Fallback: buscar datos nutricionales en API gratuita
            if (query.toLowerCase().match(/proteina|calorias|nutricion|nutrientes|vitaminas/)) {
                const nutritionResult = await searchNutrition(query);
                if (nutritionResult.found) {
                    return {
                        text: nutritionResult.content,
                        sources: nutritionResult.sources
                    };
                }
            }

            return {
                text: 'No encontre informacion especifica sobre eso. Intenta con otra busqueda o se mas especifico.',
                sources: []
            };
        }

        async function searchWikipedia(query) {
            try {
                updateTypingText('Buscando en Wikipedia...');
                
                // Primero buscar el articulo
                const searchUrl = `https://es.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=1`;
                const searchResponse = await fetch(searchUrl);
                const searchData = await searchResponse.json();
                
                if (!searchData.query.search.length) {
                    // Intentar en ingles
                    const searchUrlEn = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=1`;
                    const searchResponseEn = await fetch(searchUrlEn);
                    const searchDataEn = await searchResponseEn.json();
                    
                    if (!searchDataEn.query.search.length) {
                        return { found: false };
                    }
                    
                    // Obtener contenido en ingles y resumir
                    const titleEn = searchDataEn.query.search[0].title;
                    return await getWikipediaContent(titleEn, 'en');
                }
                
                const title = searchData.query.search[0].title;
                return await getWikipediaContent(title, 'es');
                
            } catch (error) {
                console.log('Wikipedia error:', error);
                return { found: false };
            }
        }

        async function getWikipediaContent(title, lang) {
            try {
                updateTypingText('Obteniendo informacion...');
                
                const contentUrl = `https://${lang}.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=extracts&exintro=false&explaintext=true&format=json&origin=*&exsectionformat=plain`;
                const contentResponse = await fetch(contentUrl);
                const contentData = await contentResponse.json();
                
                const pages = contentData.query.pages;
                const pageId = Object.keys(pages)[0];
                
                if (pageId === '-1' || !pages[pageId].extract) {
                    return { found: false };
                }
                
                let extract = pages[pageId].extract;
                
                // Limpiar y formatear el contenido
                extract = extract.replace(/\n{3,}/g, '\n\n');
                
                // Limitar longitud pero mantener parrafos completos
                if (extract.length > 2000) {
                    const paragraphs = extract.split('\n\n');
                    let result = '';
                    for (const p of paragraphs) {
                        if ((result + p).length < 2000) {
                            result += p + '\n\n';
                        } else {
                            break;
                        }
                    }
                    extract = result.trim();
                }
                
                // Formatear secciones como negritas
                extract = extract.replace(/^([A-Z][^.:\n]{3,50})$/gm, '**$1**');
                
                const wikiUrl = `https://${lang}.wikipedia.org/wiki/${encodeURIComponent(title.replace(/ /g, '_'))}`;
                
                return {
                    found: true,
                    content: extract,
                    sources: [
                        { name: `Wikipedia - ${title}`, url: wikiUrl }
                    ]
                };
                
            } catch (error) {
                return { found: false };
            }
        }

        async function searchDuckDuckGo(query) {
            try {
                updateTypingText('Buscando informacion adicional...');
                
                const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.Abstract && data.Abstract.length > 50) {
                    let content = data.Abstract;
                    
                    // Agregar datos relacionados si existen
                    if (data.RelatedTopics && data.RelatedTopics.length > 0) {
                        content += '\n\n**Informacion relacionada:**\n';
                        const topics = data.RelatedTopics.slice(0, 3);
                        for (const topic of topics) {
                            if (topic.Text) {
                                content += `- ${topic.Text.substring(0, 150)}...\n`;
                            }
                        }
                    }
                    
                    const sources = [];
                    if (data.AbstractURL) {
                        sources.push({ name: data.AbstractSource || 'Fuente', url: data.AbstractURL });
                    }
                    
                    return {
                        found: true,
                        content: content,
                        sources: sources
                    };
                }
                
                // Usar Infobox si existe
                if (data.Infobox && data.Infobox.content) {
                    let content = '';
                    for (const item of data.Infobox.content.slice(0, 10)) {
                        if (item.label && item.value) {
                            content += `**${item.label}:** ${item.value}\n`;
                        }
                    }
                    
                    if (content.length > 50) {
                        return {
                            found: true,
                            content: content,
                            sources: data.AbstractURL ? [{ name: 'DuckDuckGo', url: data.AbstractURL }] : []
                        };
                    }
                }
                
                return { found: false };
                
            } catch (error) {
                console.log('DuckDuckGo error:', error);
                return { found: false };
            }
        }

        async function searchNutrition(query) {
            try {
                updateTypingText('Buscando datos nutricionales...');
                
                // Extraer el alimento de la consulta
                const foodTerms = query.toLowerCase()
                    .replace(/proteina|calorias|nutricion|nutrientes|vitaminas|cuanta|cuanto|tiene|el|la|del|de|en/g, '')
                    .trim();
                
                if (!foodTerms) return { found: false };
                
                // Usar USDA FoodData Central API (gratis)
                const url = `https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(foodTerms)}&pageSize=1&api_key=DEMO_KEY`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.foods && data.foods.length > 0) {
                    const food = data.foods[0];
                    let content = `**Informacion nutricional: ${food.description}**\n\n`;
                    content += `Por cada 100 gramos:\n\n`;
                    
                    const nutrients = food.foodNutrients || [];
                    const important = [
                        'Energy', 'Protein', 'Total lipid (fat)', 'Carbohydrate', 
                        'Fiber', 'Sugars', 'Calcium', 'Iron', 'Sodium',
                        'Vitamin C', 'Vitamin A', 'Vitamin D', 'Vitamin B-12',
                        'Cholesterol', 'Potassium', 'Magnesium'
                    ];
                    
                    const translations = {
                        'Energy': 'Energia',
                        'Protein': 'Proteina',
                        'Total lipid (fat)': 'Grasa total',
                        'Carbohydrate, by difference': 'Carbohidratos',
                        'Fiber, total dietary': 'Fibra',
                        'Sugars, total including NLEA': 'Azucares',
                        'Calcium, Ca': 'Calcio',
                        'Iron, Fe': 'Hierro',
                        'Sodium, Na': 'Sodio',
                        'Vitamin C, total ascorbic acid': 'Vitamina C',
                        'Vitamin A, RAE': 'Vitamina A',
                        'Vitamin D (D2 + D3)': 'Vitamina D',
                        'Vitamin B-12': 'Vitamina B12',
                        'Cholesterol': 'Colesterol',
                        'Potassium, K': 'Potasio',
                        'Magnesium, Mg': 'Magnesio'
                    };
                    
                    for (const nutrient of nutrients) {
                        const name = nutrient.nutrientName;
                        for (const imp of important) {
                            if (name && name.includes(imp)) {
                                const translatedName = translations[name] || name;
                                content += `- ${translatedName}: ${nutrient.value} ${nutrient.unitName}\n`;
                                break;
                            }
                        }
                    }
                    
                    return {
                        found: true,
                        content: content,
                        sources: [
                            { name: 'USDA FoodData Central (Departamento de Agricultura de EE.UU.)', url: 'https://fdc.nal.usda.gov/' }
                        ]
                    };
                }
                
                return { found: false };
                
            } catch (error) {
                console.log('Nutrition API error:', error);
                return { found: false };
            }
        }

        function clearChat() {
            chatContainer.innerHTML = `
                <div class="welcome" id="welcome">
                    <div class="icon">P</div>
                    <h2>Hola, soy Pisi</h2>
                    <p>Busco informacion en internet y te muestro las fuentes oficiales.</p>
                    <div class="suggestions">
                        <div class="suggestion" onclick="askSuggestion('Proteina en pechuga de pollo')">Nutricion</div>
                        <div class="suggestion" onclick="askSuggestion('Albert Einstein')">Biografias</div>
                        <div class="suggestion" onclick="askSuggestion('Segunda Guerra Mundial')">Historia</div>
                        <div class="suggestion" onclick="askSuggestion('Sistema solar')">Ciencia</div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
